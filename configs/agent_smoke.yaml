# 1エージェントスモークテストの設定（1ゲームのみ）
#
# 使い方:
#   python3 scripts/qwen_turn_game_agent_smoke.py --config configs/agent_smoke.yaml

model_path: ~/models/Qwen3-14B

seed: 42

# LLM生成パラメータ
max_new_tokens: 96

# 探索ベース評価のロールアウト数
evaluator_rollouts: 24

# 出力先
output: hivc_sim/results/turn_game/qwen_agent_smoke.csv
