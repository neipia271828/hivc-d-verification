# GLM-4.7 flagship: control / consulting / hivc_d x 30 seeds = 90 games.
conditions:
  - control
  - consulting
  - hivc_d
games: 30
seed: 42

model: glm-4.7
do_sample: false
temperature: 0.2

role_value_mode: soft_value
role_file: configs/profiles_soft_value.yaml
alpha_role_key: null
beta_role_key: null
personas_file: null
persona_params_file: null
alpha_persona: null
beta_persona: null
random_persona: false
random_seed: null

max_new_tokens: 256
max_discussion_turns: 6
discussion_token_budget: 1536
evaluator_rollouts: 24
decision_schedule_seed: 0
max_decision_opportunities: 3

# A longer timeout avoids duplicating paid requests whose first response arrives
# just after the 60-second smoke-test limit. Provider throttling is retried for
# long unattended runs instead of terminating the experiment.
request_timeout_seconds: 120
http_max_retries: 0
http_backoff_seconds: 1
request_interval_seconds: 0
adaptive_rate_limit: true
adaptive_min_interval_seconds: 0.5
adaptive_initial_interval_seconds: 1.0
adaptive_max_interval_seconds: 30.0
adaptive_cooldown_seconds: 120
adaptive_max_retries: 1000
compact_prompts: true
max_total_tokens: 25000000

# Three independent accounts handle the three condition workers concurrently.
# The assignment rotates by seed to counterbalance account-specific latency.
parallel_conditions: true
api_concurrency: 3
api_concurrency_per_key: 1
api_key_envs:
  - ZAI_API_KEY
  - ZAI_API_KEY_2
  - ZAI_API_KEY_3
thinking_enabled: false

output_dir: hivc_sim/results/turn_game/zai/runs
